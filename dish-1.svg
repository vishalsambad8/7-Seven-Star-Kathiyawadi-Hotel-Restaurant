<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f1e8"/>
  
  <!-- Plate -->
  <circle cx="400" cy="350" r="200" fill="#fff8f0" stroke="#d4af8a" stroke-width="8"/>
  <circle cx="400" cy="350" r="190" fill="#fffdf8" stroke="#e8dcc8" stroke-width="2"/>
  
  <!-- Grilled Salmon -->
  <ellipse cx="350" cy="320" rx="90" ry="70" fill="#e67e3c"/>
  <ellipse cx="350" cy="315" rx="85" ry="65" fill="#f0956a"/>
  <path d="M 280 300 Q 310 290 340 295 Q 320 310 280 320 Z" fill="#d66a2f" opacity="0.6"/>
  <path d="M 360 340 Q 390 335 410 345 Q 390 355 360 350 Z" fill="#d66a2f" opacity="0.5"/>
  
  <!-- Herb garnish on salmon -->
  <ellipse cx="330" cy="310" rx="8" ry="12" fill="#2d5016" transform="rotate(-30 330 310)"/>
  <ellipse cx="345" cy="305" rx="8" ry="12" fill="#3d6b1f" transform="rotate(20 345 305)"/>
  <ellipse cx="355" cy="325" rx="8" ry="12" fill="#2d5016" transform="rotate(-40 355 325)"/>
  
  <!-- Seasonal vegetables -->
  <!-- Asparagus -->
  <line x1="420" y1="280" x2="440" y2="250" stroke="#5a8a3a" stroke-width="6" stroke-linecap="round"/>
  <line x1="425" y1="285" x2="445" y2="255" stroke="#6ba344" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Another asparagus -->
  <line x1="440" y1="290" x2="465" y2="260" stroke="#5a8a3a" stroke-width="6" stroke-linecap="round"/>
  <line x1="443" y1="293" x2="468" y2="263" stroke="#6ba344" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Roasted beets -->
  <circle cx="470" cy="340" r="25" fill="#8b3a3a"/>
  <circle cx="475" cy="345" r="20" fill="#a85050"/>
  <circle cx="465" cy="330" r="22" fill="#8b3a3a"/>
  <circle cx="460" cy="340" r="18" fill="#a85050"/>
  
  <!-- Lemon mash (creamy base) -->
  <ellipse cx="350" cy="380" rx="120" ry="40" fill="#f4e4a6"/>
  <path d="M 250 375 Q 280 390 350 395 Q 420 390 450 375" fill="#e8d896"/>
  
  <!-- Decorative swirl of sauce -->
  <path d="M 300 400 Q 350 385 400 400" stroke="#c4a000" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Fancy plate decoration -->
  <circle cx="280" cy="280" r="6" fill="#d4af8a" opacity="0.5"/>
  <circle cx="520" cy="320" r="5" fill="#d4af8a" opacity="0.5"/>
  <circle cx="350" cy="480" r="7" fill="#d4af8a" opacity="0.5"/>
</svg>