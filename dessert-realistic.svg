<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="plateGloss" cx="35%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f5f1e8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d9cfc0;stop-opacity:0.2" />
    </radialGradient>
    <linearGradient id="chocolateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2511;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3d1f0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1508;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#faf7f2"/>
  
  <!-- Wooden table -->
  <rect x="0" y="480" width="800" height="120" fill="#6b4423"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#5a3618" stroke-width="1" opacity="0.4"/>
  
  <!-- Plate -->
  <ellipse cx="400" cy="320" rx="220" ry="200" fill="#f5ede0" filter="url(#shadow3)"/>
  <ellipse cx="400" cy="310" rx="215" ry="195" fill="url(#plateGloss)"/>
  
  <!-- Tart base crust -->
  <ellipse cx="400" cy="330" rx="150" ry="140" fill="#8b6914"/>
  <ellipse cx="398" cy="325" rx="145" ry="135" fill="#a88b2a"/>
  <!-- Crust texture -->
  <ellipse cx="380" cy="310" rx="60" ry="50" fill="#9d7a20" opacity="0.6"/>
  <ellipse cx="420" cy="315" rx="70" ry="55" fill="#9d7a20" opacity="0.5"/>
  
  <!-- Dark chocolate ganache -->
  <ellipse cx="400" cy="340" rx="130" ry="110" fill="url(#chocolateGrad)" filter="url(#shadow3)"/>
  <ellipse cx="398" cy="335" rx="128" ry="108" fill="#5a3018"/>
  <!-- Glossy shine -->
  <ellipse cx="380" cy="320" rx="70" ry="50" fill="#8b5a3c" opacity="0.4"/>
  <ellipse cx="420" cy="325" rx="55" ry="45" fill="#6b3f27" opacity="0.3"/>
  
  <!-- Sea salt crystals scattered on top -->
  <g filter="url(#shadow3)">
    <circle cx="350" cy="310" r="5" fill="#ffffff" opacity="0.8"/>
    <circle cx="365" cy="315" r="3.5" fill="#ffffff" opacity="0.75"/>
    <circle cx="380" cy="305" r="4" fill="#ffffff" opacity="0.7"/>
    <circle cx="420" cy="300" r="4.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="440" cy="320" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="455" cy="310" r="3.5" fill="#ffffff" opacity="0.72"/>
    <circle cx="400" cy="295" r="4" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Toasted almonds -->
  <g filter="url(#shadow3)">
    <!-- Almond 1 -->
    <ellipse cx="330" cy="360" rx="16" ry="22" fill="#8b6f47" transform="rotate(-35 330 360)"/>
    <ellipse cx="328" cy="358" rx="13" ry="19" fill="#a88859" transform="rotate(-35 328 358)"/>
    
    <!-- Almond 2 -->
    <ellipse cx="380" cy="375" rx="15" ry="21" fill="#8b6f47" transform="rotate(25 380 375)"/>
    <ellipse cx="378" cy="373" rx="12" ry="18" fill="#a88859" transform="rotate(25 378 373)"/>
    
    <!-- Almond 3 -->
    <ellipse cx="460" cy="365" rx="16" ry="22" fill="#8b6f47" transform="rotate(-15 460 365)"/>
    <ellipse cx="458" cy="363" rx="13" ry="19" fill="#a88859" transform="rotate(-15 458 363)"/>
    
    <!-- Almond 4 -->
    <ellipse cx="420" cy="385" rx="15" ry="20" fill="#8b6f47" transform="rotate(40 420 385)"/>
    <ellipse cx="418" cy="383" rx="12" ry="17" fill="#a88859" transform="rotate(40 418 383)"/>
  </g>
  
  <!-- Caramel drizzle -->
  <path d="M 320 350 Q 340 360 360 355 Q 380 350 400 365" stroke="#d4a000" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85" filter="url(#shadow3)"/>
  <path d="M 320 350 Q 340 360 360 355 Q 380 350 400 365" stroke="#e8b820" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Second caramel line -->
  <path d="M 440 340 Q 460 355 480 345" stroke="#d4a000" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8" filter="url(#shadow3)"/>
  
  <!-- Mint leaf decoration -->
  <g filter="url(#shadow3)">
    <ellipse cx="470" cy="300" rx="20" ry="28" fill="#2d5016"/>
    <ellipse cx="470" cy="300" rx="18" ry="26" fill="#3d6b1f"/>
    <path d="M 455 300 Q 470 290 485 300" stroke="#1a3009" stroke-width="1" opacity="0.6" fill="none"/>
    <path d="M 455 310 Q 470 305 485 310" stroke="#1a3009" stroke-width="1" opacity="0.5" fill="none"/>
  </g>
</svg>