<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - dark bar atmosphere -->
  <rect width="800" height="600" fill="#1a1410"/>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#d0e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dce8;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="drinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeb99;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f4d981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a550;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Martini Glass -->
  <!-- Glass bowl -->
  <path d="M 250 200 L 350 350 L 380 350 L 480 200 Z" fill="url(#glassGrad)" stroke="#a8c8d8" stroke-width="2"/>
  
  <!-- Glass stem -->
  <rect x="360" y="350" width="20" height="80" fill="url(#glassGrad)" stroke="#a8c8d8" stroke-width="2"/>
  
  <!-- Glass base -->
  <ellipse cx="370" cy="435" rx="45" ry="20" fill="url(#glassGrad)" stroke="#a8c8d8" stroke-width="2"/>
  <ellipse cx="370" cy="433" rx="45" ry="18" fill="#d0e8f0" opacity="0.5"/>
  
  <!-- Drink liquid -->
  <path d="M 260 250 L 340 330 L 380 330 L 460 250 Q 360 260 260 250 Z" fill="url(#drinkGrad)" opacity="0.9"/>
  
  <!-- Cocktail reflections -->
  <ellipse cx="320" cy="270" rx="25" ry="30" fill="#ffff99" opacity="0.3"/>
  <ellipse cx="410" cy="280" rx="20" ry="25" fill="#ffffff" opacity="0.2"/>
  
  <!-- Olive garnish -->
  <circle cx="370" cy="240" r="12" fill="#2d5016"/>
  <circle cx="370" cy="240" r="10" fill="#3d6b1f"/>
  <!-- Olive pick stick -->
  <line x1="370" y1="228" x2="370" y2="200" stroke="#c4a000" stroke-width="2"/>
  <!-- Small flag -->
  <rect x="370" y="195" width="25" height="15" fill="#c41f1f" opacity="0.8"/>
  
  <!-- Second cocktail - Margarita -->
  <!-- Glass body -->
  <path d="M 600 240 L 640 100 L 730 100 L 700 240 Z" fill="url(#glassGrad)" stroke="#a8c8d8" stroke-width="2"/>
  <!-- Margarita salt rim -->
  <ellipse cx="665" cy="100" rx="65" ry="12" fill="#f5f1e8" opacity="0.6"/>
  <ellipse cx="665" cy="99" rx="65" ry="10" fill="#ffffff" opacity="0.5"/>
  
  <!-- Glass stem -->
  <rect x="680" y="240" width="18" height="70" fill="url(#glassGrad)" stroke="#a8c8d8" stroke-width="2"/>
  
  <!-- Glass base -->
  <ellipse cx="689" cy="315" rx="40" ry="18" fill="url(#glassGrad)" stroke="#a8c8d8" stroke-width="2"/>
  <ellipse cx="689" cy="313" rx="40" ry="16" fill="#d0e8f0" opacity="0.5"/>
  
  <!-- Margarita liquid (lime green) -->
  <path d="M 610 160 L 640 150 L 710 150 L 700 200 Z" fill="#5ade8a" opacity="0.8"/>
  
  <!-- Lime wheel garnish -->
  <circle cx="665" cy="130" r="20" fill="#5ade8a" stroke="#3d8a5f" stroke-width="2"/>
  <circle cx="665" cy="130" r="18" fill="#7ae8a8"/>
  <!-- Lime segments -->
  <line x1="665" y1="110" x2="665" y2="150" stroke="#3d8a5f" stroke-width="1" opacity="0.7"/>
  <line x1="645" y1="130" x2="685" y2="130" stroke="#3d8a5f" stroke-width="1" opacity="0.7"/>
  <line x1="650" y1="115" x2="680" y2="145" stroke="#3d8a5f" stroke-width="1" opacity="0.7"/>
  <line x1="650" y1="145" x2="680" y2="115" stroke="#3d8a5f" stroke-width="1" opacity="0.7"/>
  
  <!-- Cocktail umbrellas -->
  <line x1="370" y1="250" x2="320" y2="220" stroke="#c4a000" stroke-width="1.5" opacity="0.8"/>
  <path d="M 315 218 Q 310 210 315 205 Q 320 210 325 218" fill="#c41f1f" opacity="0.8"/>
  
  <!-- Bar counter -->
  <rect x="0" y="450" width="800" height="150" fill="#4a2f1a"/>
  <rect x="0" y="445" width="800" height="10" fill="#8b6f47" stroke="#d4af8a" stroke-width="2"/>
  
  <!-- Ice cubes -->
  <rect x="500" y="320" width="25" height="25" fill="#e8f4f8" stroke="#b8dce8" stroke-width="1" opacity="0.8"/>
  <rect x="335" y="310" width="22" height="22" fill="#e8f4f8" stroke="#b8dce8" stroke-width="1" opacity="0.8"/>
  <rect x="420" y="305" width="20" height="20" fill="#e8f4f8" stroke="#b8dce8" stroke-width="1" opacity="0.8"/>
</svg>