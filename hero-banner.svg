<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="heroShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="heroPlateGrad" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ede8dd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9bfb0;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="heroSalmonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9050;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e67e3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35a2f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Elegant table setting background -->
  <rect width="1000" height="700" fill="#e8e0d5"/>
  
  <!-- Soft lighting gradient -->
  <defs>
    <radialGradient id="lighting" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d0c8bd;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1000" height="700" fill="url(#lighting)"/>
  
  <!-- Wooden table surface in background -->
  <rect x="0" y="450" width="1000" height="250" fill="#7a5a3a"/>
  <line x1="0" y1="500" x2="1000" y2="500" stroke="#6a4a2a" stroke-width="2" opacity="0.3"/>
  
  <!-- Large elegant plate -->
  <ellipse cx="650" cy="400" rx="280" ry="260" fill="url(#heroPlateGrad)" filter="url(#heroShadow)"/>
  <ellipse cx="665" cy="375" rx="180" ry="140" fill="#ffffff" opacity="0.3"/>
  
  <!-- Premium dish presentation -->
  <!-- Grilled salmon as main element -->
  <g filter="url(#heroShadow)">
    <ellipse cx="580" cy="390" rx="140" ry="110" fill="url(#heroSalmonGrad)"/>
    <!-- Grill marks -->
    <line x1="480" y1="340" x2="550" y2="400" stroke="#c45a24" stroke-width="4" opacity="0.7"/>
    <line x1="490" y1="330" x2="560" y2="390" stroke="#c45a24" stroke-width="4" opacity="0.7"/>
    <line x1="500" y1="320" x2="570" y2="380" stroke="#c45a24" stroke-width="4" opacity="0.7"/>
    <line x1="600" y1="310" x2="680" y2="370" stroke="#c45a24" stroke-width="4" opacity="0.6"/>
    <!-- Highlights -->
    <ellipse cx="560" cy="360" rx="50" ry="60" fill="#ffaa66" opacity="0.4"/>
    <ellipse cx="610" cy="385" rx="35" ry="40" fill="#ffbb77" opacity="0.3"/>
  </g>
  
  <!-- Microgreens and herbs on top -->
  <g filter="url(#heroShadow)">
    <ellipse cx="540" cy="340" rx="10" ry="16" fill="#2d5016" transform="rotate(-40 540 340)"/>
    <ellipse cx="560" cy="330" rx="10" ry="16" fill="#3d6b1f" transform="rotate(30 560 330)"/>
    <ellipse cx="580" cy="335" rx="10" ry="16" fill="#2d5016" transform="rotate(-25 580 335)"/>
    <ellipse cx="610" cy="330" rx="10" ry="16" fill="#3d6b1f" transform="rotate(45 610 330)"/>
  </g>
  
  <!-- Asparagus spears -->
  <g filter="url(#heroShadow)">
    <path d="M 700 380 Q 720 350 740 310" stroke="#4a7c3a" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M 700 380 Q 720 350 740 310" stroke="#5a9e4a" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 730 390 Q 755 360 775 320" stroke="#4a7c3a" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 730 390 Q 755 360 775 320" stroke="#5a9e4a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Roasted beets -->
  <g filter="url(#heroShadow)">
    <circle cx="720" cy="420" r="32" fill="#8b3a3a"/>
    <circle cx="728" cy="415" r="30" fill="#a85050"/>
    <circle cx="705" cy="405" r="28" fill="#8b3a3a"/>
    <circle cx="710" cy="413" r="26" fill="#a85050"/>
  </g>
  
  <!-- Creamy sauce base -->
  <g filter="url(#heroShadow)">
    <ellipse cx="600" cy="480" rx="160" ry="70" fill="#f4e4a6"/>
    <ellipse cx="605" cy="475" rx="155" ry="65" fill="#ffedd5" opacity="0.5"/>
    <ellipse cx="570" cy="485" rx="80" ry="35" fill="#ffffff" opacity="0.2"/>
    <ellipse cx="660" cy="480" rx="90" ry="40" fill="#ffffff" opacity="0.15"/>
  </g>
  
  <!-- Sauce drizzle with elegance -->
  <path d="M 480 500 Q 550 485 620 505" stroke="#d4a000" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9" filter="url(#heroShadow)"/>
  <path d="M 700 460 Q 750 470 800 450" stroke="#8b3a3a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8" filter="url(#heroShadow)"/>
  
  <!-- Wine glass in background (soft blur effect) -->
  <g opacity="0.6" filter="url(#heroShadow)">
    <path d="M 200 300 L 240 200 L 280 200 L 320 300 Z" fill="#e8f4f8" stroke="#b8dce8" stroke-width="2"/>
    <rect x="240" y="300" width="40" height="80" fill="#e8f4f8" stroke="#b8dce8" stroke-width="2"/>
    <ellipse cx="260" cy="385" rx="30" ry="12" fill="#e8f4f8" stroke="#b8dce8" stroke-width="2"/>
    <!-- Wine inside -->
    <path d="M 210 280 L 240 180 L 280 180 L 310 280 Z" fill="#c41f1f" opacity="0.7"/>
  </g>
  
  <!-- Candlelight glow effect -->
  <circle cx="150" cy="150" r="60" fill="#ffeb99" opacity="0.15"/>
  <circle cx="150" cy="150" r="40" fill="#ffdd66" opacity="0.1"/>
  
  <!-- Premium presentation space -->
  <text x="50" y="600" font-family="Georgia, serif" font-size="48" fill="#6b4423" opacity="0.3">Exquisite Dining</text>
</svg>