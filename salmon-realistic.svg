<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="plateGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f0ede5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4c5b0;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="salmonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c42;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e67e3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d46a2f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#faf7f2"/>
  
  <!-- Plate with gradient -->
  <circle cx="400" cy="350" r="210" fill="url(#plateGradient)" filter="url(#shadow)"/>
  <circle cx="380" cy="320" r="30" fill="#ffffff" opacity="0.4"/>
  
  <!-- Grilled salmon with realistic gradient -->
  <g filter="url(#shadow)">
    <ellipse cx="320" cy="340" rx="110" ry="85" fill="url(#salmonGradient)"/>
    <!-- Grill marks -->
    <line x1="240" y1="300" x2="290" y2="340" stroke="#c45a24" stroke-width="3" opacity="0.6"/>
    <line x1="250" y1="290" x2="300" y2="330" stroke="#c45a24" stroke-width="3" opacity="0.6"/>
    <line x1="260" y1="280" x2="310" y2="320" stroke="#c45a24" stroke-width="3" opacity="0.6"/>
    <line x1="330" y1="270" x2="380" y2="310" stroke="#c45a24" stroke-width="3" opacity="0.6"/>
    <line x1="340" y1="265" x2="390" y2="305" stroke="#c45a24" stroke-width="3" opacity="0.6"/>
    <!-- Highlights -->
    <ellipse cx="310" cy="310" rx="35" ry="45" fill="#ff9955" opacity="0.5"/>
    <ellipse cx="340" cy="325" rx="25" ry="30" fill="#ffaa66" opacity="0.3"/>
  </g>
  
  <!-- Asparagus -->
  <g filter="url(#shadow)">
    <path d="M 450 300 Q 460 280 470 250" stroke="#4a7c3a" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 450 300 Q 460 280 470 250" stroke="#5a9e4a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <line x1="465" y1="260" x2="468" y2="245" stroke="#3d6b1f" stroke-width="2" opacity="0.5"/>
    <line x1="472" y1="255" x2="475" y2="240" stroke="#3d6b1f" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Second asparagus -->
  <g filter="url(#shadow)">
    <path d="M 480 310 Q 495 285 510 260" stroke="#4a7c3a" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 480 310 Q 495 285 510 260" stroke="#5a9e4a" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Roasted vegetables - beets -->
  <g filter="url(#shadow)">
    <circle cx="480" cy="360" r="28" fill="#8b3a3a"/>
    <circle cx="485" cy="355" r="26" fill="#a85050"/>
    <ellipse cx="480" cy="360" rx="22" ry="24" fill="#b86060" opacity="0.6"/>
    <circle cx="475" cy="340" r="20" fill="#8b3a3a"/>
    <circle cx="478" cy="335" r="19" fill="#a85050"/>
  </g>
  
  <!-- Creamy puree base -->
  <g filter="url(#shadow)">
    <ellipse cx="350" cy="420" rx="140" ry="50" fill="#f4e4a6"/>
    <ellipse cx="355" cy="415" rx="135" ry="45" fill="#ffedd5" opacity="0.6"/>
    <!-- Light texture -->
    <ellipse cx="320" cy="425" rx="50" ry="20" fill="#ffffff" opacity="0.3"/>
    <ellipse cx="400" cy="430" rx="60" ry="22" fill="#ffffff" opacity="0.25"/>
  </g>
  
  <!-- Herb garnish -->
  <g filter="url(#shadow)">
    <ellipse cx="370" cy="310" rx="8" ry="14" fill="#2d5016" transform="rotate(-35 370 310)"/>
    <ellipse cx="385" cy="305" rx="8" ry="14" fill="#3d6b1f" transform="rotate(25 385 305)"/>
    <ellipse cx="395" cy="320" rx="8" ry="14" fill="#2d5016" transform="rotate(-40 395 320)"/>
  </g>
  
  <!-- Sauce drizzle -->
  <path d="M 280 440 Q 320 430 360 445" stroke="#d4a000" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Micro flourish -->
  <path d="M 420 405 Q 430 400 440 408" stroke="#5a9e4a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>